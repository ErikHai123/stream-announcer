name: Check YouTube Stream

on:
  # Запуск по расписанию — только раз в час как резерв
  schedule:
    - cron: "0 * * * *"
  # Запуск вручную из GitHub
  workflow_dispatch:
    inputs:
      catch_up:
        description: "Пропустить весь хвост старых видео"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run announcer script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TIMEZONE: "Europe/Moscow"
          CATCH_UP_ONLY: ${{ github.event.inputs.catch_up }}
        run: python main.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.json milestone_state.json
          git diff --quiet --cached || git commit -m "Update state files"
          git push
