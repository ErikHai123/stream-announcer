name: Check YouTube Stream

on:
  schedule:
    # Каждые 5 минут. Можно менять частоту (cron в UTC).
   - cron: "*/5 * * * *"
  workflow_dispatch: {}  # позволяет запускать вручную из вкладки Actions

permissions:
  contents: write

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run announcer script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TIMEZONE: "Europe/Moscow"
        run: python main.py

      - name: Save state (posted_ids.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.json
          git diff --quiet --cached || git commit -m "Update posted_ids.json"
          git push
